<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 | MarketNest</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark">M</span>
        <span>MarketNest</span>
      </a>
      <nav>
        <a href="/">스토어</a>
        <button id="logoutBtn" class="link-button">로그아웃</button>
      </nav>
    </header>

    <main>
      <section class="band">
        <div class="section-head">
          <div>
            <p class="eyebrow">Admin</p>
            <h1 class="page-title">주문 관리</h1>
            <p id="adminGreeting" class="muted"></p>
          </div>
          <button id="refreshOrdersBtn">새로고침</button>
        </div>
        <div id="adminGuard" class="notice hidden">관리자 권한으로 로그인하면 주문 관리 화면을 볼 수 있습니다.</div>
        <div id="adminOrders" class="admin-table"></div>
      </section>
    </main>

    <script src="/auth.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
