<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 | MarketNest</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-visual">
        <a class="brand auth-brand" href="/">
          <span class="brand-mark">M</span>
          <span>MarketNest</span>
        </a>
        <div>
          <p class="eyebrow">Welcome back</p>
          <h1>주문과 장바구니를 이어서 확인하세요.</h1>
          <p>저장된 계정으로 로그인하면 주문 조회와 관리자 화면을 바로 사용할 수 있습니다.</p>
        </div>
      </section>
      <section class="auth-card">
        <p class="eyebrow">Sign in</p>
        <h2>로그인</h2>
        <form id="loginForm">
          <label>이메일
            <input id="email" type="email" value="jinwoo@example.com" autocomplete="email">
          </label>
          <label>비밀번호
            <input id="password" type="password" value="password123" autocomplete="current-password">
          </label>
          <button>로그인</button>
          <p id="loginMessage" class="form-message"></p>
        </form>
        <p class="auth-switch">계정이 없나요? <a href="/signup.html">회원가입</a></p>
        <p class="muted small">관리자 계정: admin@example.com / admin123</p>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
