<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>주문 내역 | MarketNest</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/"><span class="brand-mark">M</span><span>MarketNest</span></a>
      <nav class="nav-links">
        <a href="/">스토어</a>
        <a id="adminLink" class="hidden" href="/admin.html">관리자</a>
        <a id="loginLink" href="/login.html">로그인</a>
        <a id="signupLink" class="nav-button" href="/signup.html">회원가입</a>
        <button id="logoutBtn" class="link-button hidden">로그아웃</button>
      </nav>
    </header>
    <main class="band">
      <div class="section-head">
        <div>
          <p class="eyebrow">Orders</p>
          <h1 class="page-title">주문 내역</h1>
          <p class="muted">회원 번호를 기준으로 주문 목록을 조회합니다.</p>
        </div>
        <div class="search-row">
          <input id="historyUserId" type="number" value="1" aria-label="회원 번호">
          <button id="historyLoadBtn">조회</button>
        </div>
      </div>
      <div id="orderHistory" class="admin-table"></div>
    </main>
    <script src="/auth.js"></script>
    <script src="/orders.js"></script>
  </body>
</html>
