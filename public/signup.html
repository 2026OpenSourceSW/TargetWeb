<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | MarketNest</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-visual signup-visual">
        <a class="brand auth-brand" href="/">
          <span class="brand-mark">M</span>
          <span>MarketNest</span>
        </a>
        <h1>새로운 취향을 발견하세요.</h1>
        <p>회원 가입 후 상품을 담고 주문을 관리할 수 있습니다.</p>
      </section>
      <section class="auth-card">
        <p class="eyebrow">Create account</p>
        <h2>회원가입</h2>
        <form id="signupForm">
          <label>이름
            <input id="name" value="New Member" autocomplete="name">
          </label>
          <label>이메일
            <input id="email" type="email" value="member@example.com" autocomplete="email">
          </label>
          <label>비밀번호
            <input id="password" type="password" value="member123" autocomplete="new-password">
          </label>
          <button>가입하기</button>
          <p id="signupMessage" class="form-message"></p>
        </form>
        <p class="auth-switch">이미 계정이 있나요? <a href="/login.html">로그인</a></p>
      </section>
    </main>
    <script src="/signup.js"></script>
  </body>
</html>
